<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Collaborate/Contact Section</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-x-hidden p-4 sm:p-6 lg:p-8">
<div class="flex w-full max-w-4xl flex-col items-center py-16">
<!-- Section Header -->
<div class="flex w-full flex-col items-center text-center mb-8">
<h2 class="text-3xl font-bold leading-tight tracking-tight text-zinc-900 dark:text-white sm:text-4xl">Let's Collaborate</h2>
<p class="mt-4 max-w-2xl text-base font-normal leading-relaxed text-zinc-600 dark:text-zinc-400">
                    I'm currently available for new projects and open to discussing freelance opportunities or collaborative work. If you have a project in mind or just want to connect, feel free to reach out.
                </p>
</div>
<!-- Form Container -->
<div class="w-full max-w-2xl rounded-xl bg-white/50 dark:bg-white/5 p-8 backdrop-blur-sm border border-zinc-200 dark:border-zinc-800">
<form action="#" class="space-y-6" method="POST">
<!-- Full Name & Email Fields -->
<div class="grid grid-cols-1 gap-x-6 gap-y-6 sm:grid-cols-2">
<label class="flex flex-col">
<p class="text-sm font-medium leading-normal pb-2 text-zinc-900 dark:text-white">Full Name</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg bg-zinc-100 dark:bg-zinc-800/50 text-zinc-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary border border-zinc-300 dark:border-zinc-700 h-12 placeholder:text-zinc-500 dark:placeholder:text-zinc-400 px-4 text-base font-normal leading-normal" placeholder="Enter your full name" type="text" value=""/>
</label>
<label class="flex flex-col">
<p class="text-sm font-medium leading-normal pb-2 text-zinc-900 dark:text-white">Email Address</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg bg-zinc-100 dark:bg-zinc-800/50 text-zinc-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary border border-zinc-300 dark:border-zinc-700 h-12 placeholder:text-zinc-500 dark:placeholder:text-zinc-400 px-4 text-base font-normal leading-normal" placeholder="Enter your email address" type="email" value=""/>
</label>
</div>
<!-- Subject Field -->
<div>
<label class="flex flex-col">
<p class="text-sm font-medium leading-normal pb-2 text-zinc-900 dark:text-white">Subject</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg bg-zinc-100 dark:bg-zinc-800/50 text-zinc-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary border border-zinc-300 dark:border-zinc-700 h-12 placeholder:text-zinc-500 dark:placeholder:text-zinc-400 px-4 text-base font-normal leading-normal" placeholder="What is this about?" type="text" value=""/>
</label>
</div>
<!-- Message Field -->
<div>
<label class="flex flex-col">
<p class="text-sm font-medium leading-normal pb-2 text-zinc-900 dark:text-white">Message</p>
<textarea class="form-textarea flex w-full min-w-0 flex-1 resize-y overflow-hidden rounded-lg bg-zinc-100 dark:bg-zinc-800/50 text-zinc-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary border border-zinc-300 dark:border-zinc-700 min-h-36 placeholder:text-zinc-500 dark:placeholder:text-zinc-400 p-4 text-base font-normal leading-normal" placeholder="Write your message here..."></textarea>
</label>
</div>
<!-- CTA Button -->
<div>
<button class="flex w-full items-center justify-center gap-2 rounded-lg bg-primary px-6 py-3 text-base font-semibold text-white transition-colors hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark" type="submit">
                            Send Message
                            <span class="material-symbols-outlined text-xl">send</span>
</button>
</div>
</form>
</div>
<!-- Alternative Contact & Social Links -->
<div class="mt-12 flex w-full flex-col items-center">
<div class="flex items-center gap-2 text-sm text-zinc-600 dark:text-zinc-400">
<span class="material-symbols-outlined text-lg">alternate_email</span>
<span>Or email me directly at</span>
<a class="font-medium text-primary hover:underline" href="mailto:hello@example.com">hello@example.com</a>
</div>
<div class="mt-6 flex items-center space-x-6">
<a class="text-zinc-500 dark:text-zinc-400 hover:text-primary dark:hover:text-primary transition-colors" href="#" title="LinkedIn">
<svg aria-hidden="true" class="h-6 w-6" fill="currentColor" viewbox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"></path></svg>
</a>
<a class="text-zinc-500 dark:text-zinc-400 hover:text-primary dark:hover:text-primary transition-colors" href="#" title="GitHub">
<svg aria-hidden="true" class="h-6 w-6" fill="currentColor" viewbox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"></path></svg>
</a>
<a class="text-zinc-500 dark:text-zinc-400 hover:text-primary dark:hover:text-primary transition-colors" href="#" title="Twitter">
<svg aria-hidden="true" class="h-6 w-6" fill="currentColor" viewbox="0 0 24 24"><path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616v.064c0 2.298 1.634 4.212 3.793 4.649-.65.177-1.354.23-2.074.195.58 1.865 2.261 3.222 4.254 3.259-1.835 1.437-4.135 2.292-6.628 2.292-.43 0-.852-.025-1.265-.075 2.37 1.521 5.217 2.406 8.313 2.406 9.98 0 15.426-8.257 15.426-15.426l-.007-.702c1.025-.738 1.913-1.666 2.62-2.712z"></path></svg>
</a>
</div>
</div>
</div>
</div>
</body></html>
